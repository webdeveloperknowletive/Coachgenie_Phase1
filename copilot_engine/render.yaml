# Render Deployment Configuration for CoachGenie
# render.yaml

  # --------------------------------------------------------
  # C. Second FastAPI Backend (AI / Analytics Engine)
  # --------------------------------------------------------
  - type: web
    name: copilot_engine
    env: python
    rootDir: copilot_engine # MATCHES YOUR VS CODE FOLDER
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn copilot_engine.main:app --host 0.0.0.0 --port $PORT" # FIXED PORT
    plan: starter
    region: singapore
    envVars:
      - key: internal_url
        fromService:
          type: pserv
          name: pgbouncer
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set this manually in the Render Dashboard for security
