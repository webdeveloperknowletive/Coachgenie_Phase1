# Render Deployment Configuration for CoachGenie
# render.yaml

# ==========================================================
# 1. THE DATABASE LAYER
# ==========================================================
databases:
  - name: coachgenie-db
    databaseName: erp
    user: postgres
    plan: starter # Upgrade to 'standard' as traffic grows
    region: singapore # Gives best Latency for users in Asia (around 30ms)

# ==========================================================
# 2. SERVICES LAYER
# ==========================================================
services:
  # --------------------------------------------------------
  # A. PgBouncer (Connection Pooling - Crucial for FastAPI)
  # --------------------------------------------------------
  - type: pserv
    name: pgbouncer
    runtime: docker
    repo: https://github.com/render-oss/docker-pgbouncer
    plan: standard
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coachgenie-db
          property: connectionString
      - key: POOL_MODE
        value: transaction
      - key: SERVER_RESET_QUERY
        value: DISCARD ALL
      - key: MAX_CLIENT_CONN
        value: 500
      - key: DEFAULT_POOL_SIZE
        value: 20

  # --------------------------------------------------------
  # B. Main FastAPI Backend (Core API)
  # --------------------------------------------------------
  - type: web
    name: backend
    env: python
    rootDir: backend # MATCHES YOUR VS CODE FOLDER
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT" # FIXED PORT
    plan: starter
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: pgbouncer
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # --------------------------------------------------------
  # C. Second FastAPI Backend (AI / Analytics Engine)
  # --------------------------------------------------------
  - type: web
    name: copilot_engine
    env: python
    rootDir: copilot_engine # MATCHES YOUR VS CODE FOLDER
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT" # FIXED PORT
    plan: starter
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: pgbouncer
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set this manually in the Render Dashboard for security

  # --------------------------------------------------------
  # D. Next.js Frontend (React Dashboard)
  # --------------------------------------------------------
  - type: web
    name: coachgenie-frontend
    env: node
    rootDir: client # MATCHES YOUR VS CODE FOLDER
    buildCommand: "npm install -g pnpm && pnpm install && pnpm run build" # SAFE PNPM BUILD
    startCommand: "pnpm start" # FIXED FOR PRODUCTION
    plan: starter
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      # Note: Once Render deploys your backends, you will need to update these
      # in the Render dashboard to the actual URLs Render gives your APIs.
      - key: NEXT_PUBLIC_MAIN_API_URL
        value: https://backend.onrender.com # Placeholder
      - key: NEXT_PUBLIC_AI_API_URL
        value: https://copilot-engine.onrender.com # Placeholder
